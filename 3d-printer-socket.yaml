---
substitutions:
  name: 3d-printer-socket
  friendly_name: 3D Printer Socket
  relay_name: 3D Printer
  device_static_ip: !secret 3d_printer_socket_wifi_manual_ip_static_ip
  device_ap_ssid: "3D-Printer-Socket"
  device_ap_password: !secret 3d_printer_socket_wifi_ap_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_manual_ip_gateway: !secret wifi_manual_ip_gateway
  wifi_manual_ip_subnet: !secret wifi_manual_ip_subnet

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  level: INFO

api:
  encryption:
    key: !secret 3d_printer_socket_esp_api_encryption_key

ota:
  - platform: esphome
    password: !secret 3d_printer_socket_esp_ota_password

packages:
  wifi: !include packages/wifi.yaml
  wifi-signal-sensors: !include packages/wifi-signal-sensors.yaml
  wifi-diagnostic-sensors: !include packages/wifi-diagnostic-sensors.yaml
  hardware: !include packages/device-configs/sonoff-basic.yaml

captive_portal:
