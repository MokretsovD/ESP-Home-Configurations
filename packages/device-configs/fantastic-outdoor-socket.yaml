---
# Fantastic Outdoor Socket Hardware Configuration
# ESP8285-based relay socket
#
# GPIO layout:
#   GPIO4  - Green relay LED (inverted)
#   GPIO5  - Red status LED (inverted)
#   GPIO12 - Relay output
#   GPIO13 - On-board button (inverted, active-low, internal pullup)
#
# Required substitutions:
#   relay_name: friendly name for the relay switch (e.g., "Compressor")

output:
  - platform: gpio
    id: red_led
    pin:
      number: GPIO5
      inverted: true
  - platform: gpio
    id: green_led
    pin:
      number: GPIO4
      inverted: true

light:
  - platform: binary
    id: red_light
    output: red_led
    internal: true
  - platform: binary
    id: green_light
    output: green_led
    internal: true

switch:
  - platform: gpio
    id: relay
    name: ${relay_name}
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on: green_light
    on_turn_off:
      - light.turn_off: green_light

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 10s
    entity_category: diagnostic
    disabled_by_default: true

binary_sensor:
  - platform: gpio
    id: physical_button
    pin:
      number: GPIO13
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Physical Button"
    internal: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - logger.log:
          level: INFO
          format: "Physical button pressed"
      - switch.toggle: relay

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            not:
              api.connected:
          then:
            - light.toggle: red_light
          else:
            - if:
                condition:
                  light.is_on: red_light
                then:
                  - light.turn_off: red_light
